name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - run: npm ci
      - run: npm run check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - run: npm ci
      - run: npm run test

  npm:
    name: npm
    needs: [check, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: npm install -g npm@latest
      - run: npm ci
      - run: npm run build
      - run: npm publish --access public --provenance

  release:
    name: Release
    needs: [npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
